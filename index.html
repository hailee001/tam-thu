<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lì Xì Đầu Năm - Trung Hải</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff3e3e;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            background: radial-gradient(circle, #4a0000 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header-title {
            text-align: center;
            margin: 15px;
            font-size: 1.8rem;
            color: var(--gold);
            text-transform: uppercase;
            text-shadow: 0 0 15px red;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }

        #auth-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            width: 90%;
            max-width: 350px;
            text-align: center;
            margin-top: 50px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: #000;
            color: white;
        }

        /* Wheel Styles */
        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            margin-top: 30px;
            display: none;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--gold);
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid var(--gold);
            z-index: 10;
            filter: drop-shadow(0 0 5px #000);
        }

        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: var(--gold);
            border-radius: 50%;
            z-index: 15;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b30000;
            font-weight: bold;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        button.main-btn {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white; padding: 10px 25px;
            border: none; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }

        #status { margin-top: 10px; font-size: 14px; color: #00ff00; display: none; }
    </style>
</head>
<body>

    <h1 class="header-title">🧧 LÌ XÌ ĐẦU NĂM 🧧</h1>

    <div id="auth-container">
        <h3>Nhận Lộc Đầu Xuân</h3>
        <input type="text" id="username" placeholder="Nhập tên của bạn...">
        <button class="main-btn" onclick="register()">VÀO QUAY</button>
    </div>

    <div id="status"></div>

    <div class="wheel-container" id="game-zone">
        <div class="pointer"></div>
        <canvas id="wheelCanvas"></canvas>
        <div class="spin-btn" onclick="spin()">QUAY</div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        // Mảng phần thưởng khớp với hình ảnh vẽ
        const prizes = ["5k", "10k", "15k", "20k", "25k", "30k", "35k", "40k", "45k", "50k", "55k", "60k"];
        const colors = ["#e74c3c", "#3498db", "#f1c40f", "#2ecc71", "#9b59b6", "#e67e22", "#1abc9c", "#34495e", "#d35400", "#c0392b", "#8e44ad", "#27ae60"];
        
        let currentRotation = 0;
        let isSpinning = false;
        let user = null;

        function drawWheel() {
            const size = 500;
            canvas.width = size;
            canvas.height = size;
            const center = size / 2;
            const arc = (Math.PI * 2) / prizes.length;

            prizes.forEach((prize, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, angle, angle + arc);
                ctx.lineTo(center, center);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 25px Arial";
                ctx.fillText(prize, center - 40, 10);
                ctx.restore();
            });
        }

        function register() {
            const name = document.getElementById('username').value.trim();
            if (!name) return;
            
            user = { name: name, spins: 0 };
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('game-zone').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            updateStatus();
            drawWheel();
        }

        function updateStatus() {
            document.getElementById('status').innerText = `Người chơi: ${user.name} | Lượt quay: ${user.spins}`;
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            user.spins++;
            updateStatus();

            let prizeIdx;
            const rand = Math.random() * 100;

            // Logic xác suất yêu cầu
            if (user.spins === 2) {
                prizeIdx = Math.random() > 0.5 ? 7 : 11; // 40k hoặc 60k
            } else if (user.spins === 4) {
                prizeIdx = 10; // 55k
            } else {
                if (rand < 1) prizeIdx = 6; // 35k
                else if (rand < 5) prizeIdx = 3; // 20k
                else if (rand < 40) prizeIdx = 2; // 15k
                else if (rand < 80) prizeIdx = 1; // 10k
                else prizeIdx = 0; // 5k
            }

            // FIX LỖI LỆCH TẠI ĐÂY:
            const arcDeg = 360 / prizes.length; // Mỗi ô 30 độ
            const extraSpins = 3600; // Quay 10 vòng
            
            // 270 là vị trí Kim ở đỉnh. 
            // (prizeIdx * arcDeg) là vị trí bắt đầu của ô trúng.
            // (arcDeg / 2) để kim chỉ vào chính giữa ô.
            const targetPos = 270 - (prizeIdx * arcDeg) - (arcDeg / 2);
            
            // Tính toán rotation mới dựa trên rotation hiện tại để không bị quay ngược
            currentRotation += extraSpins + (targetPos - (currentRotation % 360));

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                showResult(prizes[prizeIdx]);
            }, 5000);
        }

        function showResult(prize) {
            const val = parseInt(prize);
            if (val >= 20) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            Swal.fire({
                title: `TRÚNG ${prize}!`,
                html: `Chúc mừng <b>${user.name}</b>!<br><br><small>Liên hệ Trung Hải và gửi mã QR, lấy lộc đầu năm nên hoan hỉ nhé ạ tất cả là tùy vào nhân phẩm mỗi người ạ!!</small>`,
                icon: val >= 20 ? 'success' : (val >= 10 ? 'info' : 'error'),
                background: '#2c0000',
                color: '#fff',
                confirmButtonColor: '#ff3e3e'
            });

            sendTele(prize);
        }

        function sendTele(prize) {
            const token = "8247031947:AAHcOmle1n0X9L9Elyjy-rdJRBz2COJ0eN4";
            const chatId = "7829265174";
            const text = `🧧 LÌ XÌ MỚI 🧧\n👤: ${user.name}\n🎁: ${prize}\n🔄 Lượt: ${user.spins}`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
